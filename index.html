function MealRow({ meal, person, onSwap, swappedMeal }) {
  const [open, setOpen] = useState(false);
  const active = swappedMeal || meal;
  const kcal = person === "ambar" ? active.ambarKcal : active.camKcal;
  const isSwapped = !!swappedMeal;
  // Use swapped recipe's portions if available, otherwise fall back to original meal portions
  const ambarPortion = active.ambarPortion || meal.ambarPortion;
  const camPortion = active.camPortion || meal.camPortion;
  return (
    <div className="meal-row">
      <div className="meal-head" onClick={() => setOpen(o => !o)}>
        <div>
          {isSwapped && <div className="swapped-tag">swapped</div>}
          <div className="meal-tag">{meal.tag}</div>
          <div className="meal-name">{active.name}</div>
        </div>
        <div className="meal-kcal">{kcal ? `${kcal.toLocaleString()} kcal` : "—"}</div>
      </div>
      {open && (
        <div className="meal-body">
          <p className="meal-desc">{active.desc}</p>
          <div className="portion-block">
            <div className="p-col">
              <div className="p-who a">Ambar</div>
              <div className="p-amount">{ambarPortion.map((l,i) => <span key={i}>{l}{i < ambarPortion.length-1 && <br/>}</span>)}</div>
              <div className="p-kcal">{active.ambarKcal ? `~${active.ambarKcal} kcal` : "—"}</div>
            </div>
            <div className="p-col">
              <div className="p-who c">Cam</div>
              <div className="p-amount">{camPortion.map((l,i) => <span key={i}>{l}{i < camPortion.length-1 && <br/>}</span>)}</div>
              <div className="p-kcal">{active.camKcal ? `~${active.camKcal} kcal` : "—"}</div>
            </div>
          </div>
          {meal.tip && !isSwapped && <div className="meal-tip">{meal.tip}</div>}
          {meal.swapType && (
            <button className="swap-btn" onClick={() => onSwap(meal.swapType, meal)}>
              {isSwapped ? "✦ swap again" : "✦ swap this meal"}
            </button>
          )}
        </div>
      )}
    </div>
  );
}

export default function App() {
  const [tab, setTab] = useState("plan");
  const [planPerson, setPlanPerson] = useState("ambar");
  const [calPerson, setCalPerson] = useState("ambar");
  const [checked, setChecked] = useState(new Set());
  const [modal, setModal] = useState(null);
  const [selectedRecipe, setSelectedRecipe] = useState(null);
  const [filterType, setFilterType] = useState("all");
  const [swaps, setSwaps] = useState({});
  const [shopView, setShopView] = useState("meal"); // "meal" | "woolies"

  // Build dynamic shopping list from active meals
  const shopSections = useMemo(() => {
    const sections = [];
    MEALS_DATA.forEach(meal => {
      const swapped = swaps[meal.tag];
      const ingredients = swapped ? swapped.ingredients : BASE_INGREDIENTS[meal.tag] || [];
      if (ingredients.length === 0) return;
      sections.push({
        cat: swapped ? swapped.name : meal.name,
        isSwapped: !!swapped,
        items: ingredients,
      });
    });
    // Add pantry section
    sections.push({ cat: "Pantry staples", isSwapped: false, items: PANTRY });
    return sections;
  }, [swaps]);

  const totalShop = shopSections.reduce((a, s) => a + s.items.length, 0);

  // Build deduplicated Woolworths category view
  const wooliesSections = useMemo(() => {
    const seen = new Set();
    const catMap = {};
    shopSections.forEach(sec => {
      sec.items.forEach(item => {
        if (seen.has(item.name)) return;
        seen.add(item.name);
        const cat = WOOLIES_CATS[item.name] || "Other";
        if (!catMap[cat]) catMap[cat] = [];
        catMap[cat].push(item);
      });
    });
    return WOOLIES_CAT_ORDER
      .map(cat => ({ cat, items: catMap[cat] || [] }))
      .filter(s => s.items.length > 0);
  }, [shopSections]);

  const colesSections = useMemo(() => {
    const seen = new Set();
    const catMap = {};
    shopSections.forEach(sec => {
      sec.items.forEach(item => {
        if (seen.has(item.name)) return;
        seen.add(item.name);
        const cat = COLES_CATS[item.name] || "Other";
        if (!catMap[cat]) catMap[cat] = [];
        catMap[cat].push(item);
      });
    });
    return COLES_CAT_ORDER
      .map(cat => ({ cat, items: catMap[cat] || [] }))
      .filter(s => s.items.length > 0);
  }, [shopSections]);

  function toggleItem(key) {
    setChecked(prev => {
      const next = new Set(prev);
      next.has(key) ? next.delete(key) : next.add(key);
      return next;
    });
  }

  function openSwap(type, originalMeal) {
    setModal({ type, originalMeal });
    setSelectedRecipe(null);
    setFilterType(type);
  }

  function acceptSwap() {
    if (modal && selectedRecipe) {
      if (selectedRecipe._isOriginal) {
        // Restore original — just remove the swap entry
        setSwaps(prev => {
          const next = { ...prev };
          delete next[modal.originalMeal.tag];
          return next;
        });
      } else {
        setSwaps(prev => ({ ...prev, [modal.originalMeal.tag]: selectedRecipe }));
      }
      // Clear checked items for this meal since ingredients changed
      setChecked(prev => {
        const next = new Set(prev);
        const oldIngredients = BASE_INGREDIENTS[modal.originalMeal.tag] || [];
        oldIngredients.forEach(i => next.delete(`${modal.originalMeal.tag}:${i.name}`));
        return next;
      });
    }
    setModal(null);
  }

  const isCurrentlySwapped = modal && !!swaps[modal?.originalMeal?.tag];

  // Build the original meal as a recipe-shaped object for the list
  const originalAsRecipe = modal ? {
    _isOriginal: true,
    name: modal.originalMeal.name,
    desc: modal.originalMeal.desc,
    ambarKcal: modal.originalMeal.ambarKcal,
    camKcal: modal.originalMeal.camKcal,
    ambarPortion: modal.originalMeal.ambarPortion,
    camPortion: modal.originalMeal.camPortion,
  } : null;

  const allRecipes = [
    ...(isCurrentlySwapped && originalAsRecipe ? [originalAsRecipe] : []),
    ...(filterType === "all"
      ? [...SWAP_LIBRARY.breakfast, ...SWAP_LIBRARY.lunch, ...SWAP_LIBRARY.dinner]
      : SWAP_LIBRARY[filterType] || [])
  ];

  const calD = PEOPLE[calPerson];
  const calTotal = calD.meals.reduce((a, m) => a + m.kcal, 0);
  const calGap = calD.target - calTotal;
  const barColor = calPerson === "ambar" ? "#E8D5B0" : "#B0C8E8";

  return (
    <>
      <style>{css}</style>
      <div className="app">
        <div className="header">
          <div className="wordmark">Ambar & Cam</div>
          <div className="title">Nourish</div>
          <div className="subtitle">vegan · simple · weekly</div>
          <div className="tabs">
            {["plan","calories","shopping"].map(t => (
              <button key={t} className={`tab${tab===t?" active":""}`} onClick={() => setTab(t)}>{t}</button>
            ))}
          </div>
        </div>

        {/* PLAN */}
        {tab === "plan" && (
          <div>
            <div className="person-toggle">
              <button className={`p-btn ambar${planPerson==="ambar"?" active":""}`} onClick={() => setPlanPerson("ambar")}>
                Ambar<span className="p-sub">1,780 kcal target</span>
              </button>
              <button className={`p-btn cam${planPerson==="cam"?" active":""}`} onClick={() => setPlanPerson("cam")}>
                Cam<span className="p-sub">3,050 kcal target</span>
              </button>
            </div>
            <div className="sec-label">This week</div>
            <div className="week-strip">
              {WEEK.map(w => (
                <div key={w.d} className={`wday ${w.cls}`}>
                  <span className="wd">{w.d}</span>
                  <span className="wm">{w.meal}</span>
                </div>
              ))}
            </div>
            {MEALS_DATA.map((meal, i) => (
              <MealRow key={i} meal={meal} person={planPerson} onSwap={openSwap} swappedMeal={swaps[meal.tag]} />
            ))}
          </div>
        )}

        {/* CALORIES */}
        {tab === "calories" && (
          <div>
            <div className="person-toggle">
              <button className={`p-btn ambar${calPerson==="ambar"?" active":""}`} onClick={() => setCalPerson("ambar")}>
                Ambar<span className="p-sub">gentle deficit</span>
              </button>
              <button className={`p-btn cam${calPerson==="cam"?" active":""}`} onClick={() => setCalPerson("cam")}>
                Cam<span className="p-sub">maintenance</span>
              </button>
            </div>
            <div className="cal-hero">
              <div className="cal-big">{calD.target.toLocaleString()}</div>
              <div className="cal-sublabel">kcal daily target · {calD.label}</div>
            </div>
            <div className="cal-cells">
              <div className="cal-cell"><div className="cc-label">From meals</div><div className="cc-val">{calTotal.toLocaleString()}</div><div className="cc-sub">per day</div></div>
              <div className="cal-cell"><div className="cc-label">Remaining</div><div className="cc-val" style={{color: calGap < -100 ? "#E88080" : ""}}>{Math.abs(calGap).toLocaleString()}</div><div className="cc-sub">{calGap >= 0 ? "buffer" : "over"}</div></div>
              <div className="cal-cell"><div className="cc-label">Protein est.</div><div className="cc-val">{calD.protein}</div><div className="cc-sub">from plan</div></div>
            </div>
            {calD.meals.map((m, i) => (
              <div key={i}>
                <div className="mcr">
                  <div className="mcr-meal">{m.name}</div>
                  <div className="mcr-portion">{m.portion}</div>
                  <div className="mcr-kcal">{m.kcal.toLocaleString()}</div>
                </div>
                <div className="mcr-bar-wrap">
                  <div className="mcr-bar-fill" style={{width:`${Math.min(100,Math.round(m.kcal/calD.target*100))}%`, background: barColor}} />
                </div>
              </div>
            ))}
            <div className="mcr-total">
              <span className="mcr-total-label">total</span>
              <span className="mcr-total-val" style={{color: calGap < -100 ? "#E88080" : ""}}>{calTotal.toLocaleString()} kcal</span>
            </div>
          </div>
        )}

        {/* SHOPPING — dynamic */}
        {tab === "shopping" && (
          <div>
            <div className="shop-top">
              <span className="shop-prog">{checked.size} of {totalShop} items</span>
              <button className="shop-reset" onClick={() => setChecked(new Set())}>Reset</button>
            </div>
            <div className="prog-line">
              <div className="prog-done" style={{width:`${totalShop > 0 ? Math.round(checked.size/totalShop*100) : 0}%`}} />
            </div>
            <div className="shop-subtabs">
              <button className={`shop-subtab${shopView==="meal"?" active":""}`} onClick={() => setShopView("meal")}>By meal</button>
              <button className={`shop-subtab${shopView==="woolies"?" active":""}`} onClick={() => setShopView("woolies")}>Woolworths</button>
              <button className={`shop-subtab${shopView==="coles"?" active":""}`} onClick={() => setShopView("coles")}>Coles</button>
            </div>

            {shopView === "meal" && shopSections.map(sec => (
              <div key={sec.cat}>
                <div className="shop-cat">
                  <span>{sec.cat}</span>
                  {sec.isSwapped && <span className="shop-cat-swapped">swapped</span>}
                </div>
                {sec.items.map(item => {
                  const key = `${sec.cat}:${item.name}`;
                  return (
                    <div key={key} className={`shop-item${checked.has(key)?" checked":""}`} onClick={() => toggleItem(key)}>
                      <div className="chk">
                        {checked.has(key) && (
                          <svg width="7" height="7" viewBox="0 0 7 7" fill="none">
                            <path d="M1 3.5L2.8 5.5L6 1.5" stroke="#F7F5F2" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/>
                          </svg>
                        )}
                      </div>
                      <span className="item-name">{item.name}</span>
                      {item.note && <span className="item-note">{item.note}</span>}
                    </div>
                  );
                })}
              </div>
            ))}

            {(shopView === "woolies" || shopView === "coles") && (shopView === "woolies" ? wooliesSections : colesSections).map(sec => (
              <div key={sec.cat}>
                <div className="shop-cat"><span>{sec.cat}</span></div>
                {sec.items.map(item => {
                  const key = `${shopView}:${item.name}`;
                  return (
                    <div key={key} className={`shop-item${checked.has(key)?" checked":""}`} onClick={() => toggleItem(key)}>
                      <div className="chk">
                        {checked.has(key) && (
                          <svg width="7" height="7" viewBox="0 0 7 7" fill="none">
                            <path d="M1 3.5L2.8 5.5L6 1.5" stroke="#F7F5F2" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/>
                          </svg>
                        )}
                      </div>
                      <span className="item-name">{item.name}</span>
                      {item.note && <span className="item-note">{item.note}</span>}
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
        )}

        {/* SWAP MODAL */}
        {modal && (
          <div className="modal-bg" onClick={e => e.target.className === "modal-bg" && setModal(null)}>
            <div className="modal">
              <div className="modal-header">
                <div className="modal-eyebrow">Swap meal</div>
                <div className="modal-heading">choose a replacement</div>
              </div>
              <div className="modal-filter">
                {["all","breakfast","lunch","dinner"].map(f => (
                  <button key={f} className={`filter-pill${filterType===f?" active":""}`} onClick={() => setFilterType(f)}>{f}</button>
                ))}
              </div>
              <div className="recipe-list">
                {allRecipes.map((r, i) => (
                  <div key={i} className={`recipe-item${selectedRecipe===r?" selected":""}${r._isOriginal?" original":""}`} onClick={() => setSelectedRecipe(r)}>
                    {r._isOriginal && <div className="recipe-original-tag">↩ original</div>}
                    <div className="recipe-name">{r.name}</div>
                    <div className="recipe-desc">{r.desc}</div>
                    <div className="recipe-kcal">~{r.ambarKcal} kcal (Ambar) · ~{r.camKcal} kcal (Cam)</div>
                  </div>
                ))}
              </div>
              <div className="modal-footer">
                <button className="btn-cancel" onClick={() => setModal(null)}>Cancel</button>
                <button className="btn-use" disabled={!selectedRecipe} onClick={acceptSwap}>
                  {selectedRecipe ? `Use "${selectedRecipe.name}" →` : "Select a meal →"}
                </button>
              </div>
            </div>
          </div>
        )}
      </div>
    </>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
